<div class="form-group">
    <label *ngIf="label">{{ label }}</label>
    <select class="form-select" [ngModel]="selectedValue" (ngModelChange)="onSelectionChange($event)">
        <option *ngFor="let option of options" [ngValue]="option.value">
            {{ option.text }}
        </option>
    </select>
</div>
